name: Backend Tests

on:
  push:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.test_group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_group: root
            pytest_target: tests/test_*.py
          - test_group: archive
            pytest_target: tests/archive
          - test_group: background_tasks
            pytest_target: tests/background_tasks
          - test_group: cron
            pytest_target: tests/cron
          - test_group: dns
            pytest_target: tests/dns
          - test_group: dynamic_config
            pytest_target: tests/dynamic_config
          - test_group: files
            pytest_target: tests/files
          - test_group: ftb_claims
            pytest_target: tests/ftb_claims
          - test_group: mcmap
            pytest_target: tests/mcmap
          - test_group: player_locations
            pytest_target: tests/player_locations
          - test_group: players
            pytest_target: tests/players
          - test_group: servers
            pytest_target: tests/servers
          - test_group: snapshots
            pytest_target: tests/snapshots
          - test_group: templates
            pytest_target: tests/templates
          - test_group: world
            pytest_target: tests/world
    defaults:
      run:
        working-directory: backend
    env:
      MASTER_TOKEN: test-master-token
      JWT__SECRET_KEY: test-secret
      SERVER_PATH: ${{ github.workspace }}/backend/dev-servers
      STATIC_PATH: ${{ github.workspace }}/backend/.ci-static
      FD_BINARY_PATH: /usr/local/bin/fd
      MCMAP_BINARY_PATH: /usr/local/bin/mcmap
      DATABASE_URL: sqlite+aiosqlite:///./test-${{ matrix.test_group }}.sqlite3
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bzip2 curl

      - name: Install fd test dependency
        run: |
          dockerfile="${GITHUB_WORKSPACE}/Dockerfile"
          fd_version="$(awk -F= '$1 == "ARG FD_VERSION" { print $2 }' "$dockerfile")"
          fd_sha256="$(awk -F= '$1 == "ARG FD_SHA256" { print $2 }' "$dockerfile")"
          if [ -z "$fd_version" ] || [ -z "$fd_sha256" ]; then
            echo "Failed to read FD_VERSION or FD_SHA256 from ${dockerfile}" >&2
            exit 1
          fi
          curl -L "https://github.com/sharkdp/fd/releases/download/${fd_version}/fd-${fd_version}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/fd.tar.gz
          echo "${fd_sha256}  /tmp/fd.tar.gz" | sha256sum -c -
          tmpdir="$(mktemp -d)"
          tar -xzf /tmp/fd.tar.gz -C "$tmpdir"
          sudo install -m 0755 "$tmpdir/fd-${fd_version}-x86_64-unknown-linux-musl/fd" /usr/local/bin/fd
          rm -rf "$tmpdir" /tmp/fd.tar.gz
          fd --version

      - name: Prepare static files for API tests
        run: |
          mkdir -p .ci-static/assets .ci-static/static
          cp -R ../frontend-react/public/static/. .ci-static/static/
          cp ../frontend-react/public/robots.txt .ci-static/robots.txt
          printf '<!doctype html><html><body></body></html>\n' > .ci-static/index.html

      - name: Install 7z test dependencies
        if: matrix.test_group == 'root' || matrix.test_group == 'archive'
        run: sudo apt-get install -y p7zip-full

      - name: Install restic test dependencies
        if: matrix.test_group == 'snapshots' || matrix.test_group == 'world'
        run: |
          dockerfile="${GITHUB_WORKSPACE}/Dockerfile"
          restic_version="$(awk -F= '$1 == "ARG RESTIC_VERSION" { print $2 }' "$dockerfile")"
          restic_sha256="$(awk -F= '$1 == "ARG RESTIC_SHA256" { print $2 }' "$dockerfile")"
          if [ -z "$restic_version" ] || [ -z "$restic_sha256" ]; then
            echo "Failed to read RESTIC_VERSION or RESTIC_SHA256 from ${dockerfile}" >&2
            exit 1
          fi
          curl -L "https://github.com/restic/restic/releases/download/v${restic_version}/restic_${restic_version}_linux_amd64.bz2" -o /tmp/restic.bz2
          echo "${restic_sha256}  /tmp/restic.bz2" | sha256sum -c -
          tmpdir="$(mktemp -d)"
          bunzip2 -c /tmp/restic.bz2 > "$tmpdir/restic"
          sudo install -m 0755 "$tmpdir/restic" /usr/local/bin/restic
          rm -rf "$tmpdir" /tmp/restic.bz2
          restic version

      - name: Verify Docker test dependencies
        if: matrix.test_group == 'root'
        run: |
          docker version
          docker compose version

      - name: Install mcmap test dependencies
        if: matrix.test_group == 'world'
        run: |
          dockerfile="${GITHUB_WORKSPACE}/Dockerfile"
          mcmap_version="$(awk -F= '$1 == "ARG MCMAP_VERSION" { print $2 }' "$dockerfile")"
          mcmap_sha256="$(awk -F= '$1 == "ARG MCMAP_SHA256" { print $2 }' "$dockerfile")"
          if [ -z "$mcmap_version" ] || [ -z "$mcmap_sha256" ]; then
            echo "Failed to read MCMAP_VERSION or MCMAP_SHA256 from ${dockerfile}" >&2
            exit 1
          fi
          curl -L "https://github.com/xyqyear/mcmap/releases/download/${mcmap_version}/mcmap-${mcmap_version}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/mcmap.tar.gz
          echo "${mcmap_sha256}  /tmp/mcmap.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/mcmap.tar.gz -C /usr/local/bin --strip-components=1
          sudo chmod +x /usr/local/bin/mcmap
          mcmap --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run tests
        run: uv run pytest ${{ matrix.pytest_target }}
